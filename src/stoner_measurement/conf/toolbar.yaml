# Example toolbar configuration for predefined measurement sequences.
#
# Copy this file to:
#
#   <user-config-dir>/toolbar.yaml
#
# where <user-config-dir> is typically:
#
#   Windows: %APPDATA%/stoner_measurement
#   Linux:   ~/.config/stoner_measurement
#
# A user toolbar.yaml completely overrides the bundled toolbar.yaml.
#
# Buttons are added to the main toolbar after the built-in actions.
#
# Available keys:
#
#   name      - Text shown on the toolbar button.
#   image     - PNG icon filename.
#   sequence  - JSON sequence filename.
#   tooltip   - Optional tooltip/status-bar text.
#
# Special entries:
#
#   separator: true
#
# inserts a toolbar separator.
#
# Icon lookup order:
#
#   1. <user-config-dir>/resources/<image>
#   2. bundled stoner_measurement.conf/resources/<image>
#
# Default new-sequence template lookup:
#
#   1. <user-config-dir>/sequences/sequence_template.json
#   2. bundled stoner_measurement.conf/sequences/sequence_template.json
#
# The application loads this fixed filename on startup and when creating a new sequence.
#
# Sequence lookup order:
#
#   1. <user-config-dir>/sequences/<sequence>
#   2. bundled stoner_measurement.conf/sequences/<sequence>

buttons:
  # Example button definition:
  #
  # - name: "Example Measurement"
  #   image: "example.png"
  #   sequence: "example_sequence.json"
  #   tooltip: "Load the example measurement sequence"

  # Example separator:
  #
  # - separator: true