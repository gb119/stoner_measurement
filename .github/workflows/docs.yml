name: Build and Deploy Documentation

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install system libraries for headless docs build
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libopengl0 \
            graphviz \
            graphviz-dev
      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: docs
          create-args: >-
            python=3.12
            sphinx
            sphinx-automodapi
            sphinx-copybutton
            graphviz
            pip
          init-shell: bash
          condarc: |
            channels:
              - phygbu
              - conda-forge
              - defaults
            channel_priority: flexible

      - name: Install documentation dependencies
        shell: bash -el {0}
        run: |
          if micromamba install -y sphinx-better-theme; then
            echo "sphinx-better-theme installed from conda"
          else
            echo "sphinx-better-theme not available from conda, falling back to pip"
            pip install sphinx-better-theme
          fi
          pip install -e ".[docs]"

      - name: Build documentation
        shell: bash -el {0}
        run: |
          sphinx-build -b html docs docs/_build/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
