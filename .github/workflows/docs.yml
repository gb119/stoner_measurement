name: Build and Deploy Documentation

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install system libraries for headless docs build
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libopengl0 \
            graphviz \
            graphviz-dev
      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: docs
          create-args: >-
            python=3.12

      - name: Install documentation dependencies
        run: |
          micromamba install -y -n docs -c conda-forge -c defaults sphinx sphinx-automodapi sphinx-copybutton graphviz
          if micromamba install -y -n docs -c phygbu sphinx-better-theme; then
            echo "sphinx-better-theme installed from phygbu conda channel"
          else
            echo "sphinx-better-theme not found on phygbu channel, falling back to pip"
            micromamba run -n docs pip install sphinx-better-theme
          fi
          micromamba run -n docs pip install -e ".[docs]"

      - name: Build documentation
        run: |
          micromamba run -n docs sphinx-build -b html docs docs/_build/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
