name: Build and Deploy Documentation

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install system libraries for headless docs build
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libopengl0 \
            graphviz \
            graphviz-dev

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@fc2d68f6413eb2d87b895e92f8584b5b94a10167
        with:
          auto-update-conda: true
          activate-environment: stoner_measurement
          environment-file: environment.yml
          channels: phygbu,conda-forge,defaults
          channel-priority: flexible

      - name: Install package
        shell: bash -el {0}
        run: |
          pip install -e . --no-deps

      - name: Build documentation
        shell: bash -el {0}
        run: |
          python -m sphinx -b html docs docs/_build/html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
