name: Run Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        qt-binding:
          - name: PyQt6
            extra: pyqt6
            qt_api: pyqt6
            qt_lib: PyQt6
          - name: PyQt5
            extra: pyqt5
            qt_api: pyqt5
            qt_lib: PyQt5

    name: Tests (${{ matrix.qt-binding.name }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies for headless Qt
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            xvfb \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxcb-xinput0 \
            libxkbcommon-x11-0 \
            libxcb-xfixes0 \
            libxkbcommon0 \
            libdbus-1-3 \
            libegl1

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"
          channels: phygbu,conda-forge,defaults
          channel-priority: flexible

      - name: Install package and test dependencies
        shell: bash -el {0}
        run: |
          pip install -e ".[dev,instruments,${{ matrix.qt-binding.extra }}]"

      - name: Run tests
        shell: bash -el {0}
        env:
          QT_API: ${{ matrix.qt-binding.qt_api }}
          PYQTGRAPH_QT_LIB: ${{ matrix.qt-binding.qt_lib }}
          QT_QPA_PLATFORM: xcb
          QT_OPENGL: software
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: |
          python -c "
          from qtpy.QtCore import QLibraryInfo
          print('Qt binding:', '${{ matrix.qt-binding.name }}')
          print('Qt plugins:', QLibraryInfo.path(QLibraryInfo.LibraryPath.PluginsPath))
          "
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            pytest --cov --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-report-${{ matrix.qt-binding.qt_api }}
          path: coverage.xml
