name: Run Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies for headless Qt
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            xvfb \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxcb-xinput0 \
            libxkbcommon-x11-0 \
            libxcb-xfixes0 \
            libxkbcommon0 \
            libdbus-1-3 \
            libegl1

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"
          channels: phygbu,conda-forge,defaults
          channel-priority: flexible

      - name: Install package and test dependencies
        shell: bash -el {0}
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        shell: bash -el {0}
        env:
          QT_QPA_PLATFORM: offscreen
          QT_OPENGL: software
          LIBGL_ALWAYS_SOFTWARE: "1"
          QT_DEBUG_PLUGINS: "1"
        run: |
          python -c "from PyQt6.QtCore import QLibraryInfo; print('Qt plugins:', QLibraryInfo.path(QLibraryInfo.LibraryPath.PluginsPath))"
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            pytest --cov --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-report
          path: coverage.xml
