name: Run Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        qt-backend: [pyqt5, pyqt6]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies for headless Qt
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            xvfb \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxcb-xinput0 \
            libxkbcommon-x11-0 \
            libxcb-xfixes0 \
            libxkbcommon0 \
            libdbus-1-3 \
            libegl1

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"
          channels: phygbu,conda-forge,defaults
          channel-priority: flexible

      - name: Install package and test dependencies
        shell: bash -el {0}
        run: |
          pip install -e ".[dev,instruments,${{ matrix.qt-backend }}]"

      - name: Run tests
        shell: bash -el {0}
        env:
          QT_QPA_PLATFORM: xcb
          QT_OPENGL: software
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: |
          echo "Testing backend: ${{ matrix.qt-backend }}"
          python -c "from qtpy.QtCore import QLibraryInfo; print('Qt API:', __import__('qtpy').API_NAME); print('Qt plugins:', QLibraryInfo.path(QLibraryInfo.LibraryPath.PluginsPath))"
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            pytest --cov --cov-report=xml --cov-report=term-missing
          mv .coverage .coverage.${{ matrix.qt-backend }}

      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-data-${{ matrix.qt-backend }}
          path: |
            .coverage.${{ matrix.qt-backend }}
            coverage.xml

  coverage:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install coverage tools
        run: |
          python -m pip install coverage

      - name: Download PyQt5 coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-data-pyqt5
          path: coverage-pyqt5

      - name: Download PyQt6 coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-data-pyqt6
          path: coverage-pyqt6

      - name: Combine coverage
        run: |
          cp coverage-pyqt5/.coverage.pyqt5 .
          cp coverage-pyqt6/.coverage.pyqt6 .
          coverage combine .coverage.pyqt5 .coverage.pyqt6
          coverage xml -o coverage.xml
          coverage report

      - name: Upload merged coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-combined
          path: coverage.xml

      - name: Upload coverage to Codacy
        if: github.event_name != 'pull_request'
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          if [ -n "$CODACY_PROJECT_TOKEN" ]; then
            bash <(curl -Ls https://coverage.codacy.com/get.sh) report -r coverage.xml
          else
            echo "CODACY_PROJECT_TOKEN not set - skipping upload"
          fi
