name: Run Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - qt-backend: pyqt5
            python-version: "3.12"
            environment-file: environment-pyqt5.yml
          - qt-backend: pyqt5
            python-version: "3.14"
            environment-file: environment-pyqt5.yml
          - qt-backend: pyqt6
            python-version: "3.12"
            environment-file: environment-pyqt6.yml
          - qt-backend: pyqt6
            python-version: "3.14"
            environment-file: environment-pyqt6.yml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create CI environment file
        shell: pwsh
        run: |
          Copy-Item "${{ matrix.environment-file }}" ci-environment.yml
          (Get-Content ci-environment.yml) `
            -replace 'python>=3.12,<3.15', 'python=${{ matrix.python-version }}' |
            Set-Content ci-environment.yml

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: stoner_measurement
          environment-file: ci-environment.yml
          channels: phygbu,conda-forge,defaults
          channel-priority: flexible

      - name: Install package
        shell: bash -el {0}
        run: |
          pip install -e . --no-deps

      - name: Run tests
        shell: bash -el {0}
        run: |
          echo "Testing backend: ${{ matrix.qt-backend }}"
          echo "Testing Python: ${{ matrix.python-version }}"
          python -c "from qtpy.QtCore import QLibraryInfo; print('Qt API:', __import__('qtpy').API_NAME); print('Qt plugins:', QLibraryInfo.path(QLibraryInfo.LibraryPath.PluginsPath))"
          pytest --cov --cov-report=xml --cov-report=term-missing
          mv .coverage .coverage.${{ matrix.qt-backend }}-${{ matrix.python-version }}

      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-data-${{ matrix.qt-backend }}-${{ matrix.python-version }}
          path: |
            .coverage.${{ matrix.qt-backend }}-${{ matrix.python-version }}
            coverage.xml

  coverage:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install coverage tools
        run: |
          python -m pip install coverage

      - name: Download PyQt5 Python 3.12 coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-data-pyqt5-3.12
          path: coverage-pyqt5-312

      - name: Download PyQt5 Python 3.14 coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-data-pyqt5-3.14
          path: coverage-pyqt5-314

      - name: Download PyQt6 Python 3.12 coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-data-pyqt6-3.12
          path: coverage-pyqt6-312

      - name: Download PyQt6 Python 3.14 coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-data-pyqt6-3.14
          path: coverage-pyqt6-314

      - name: Combine coverage
        run: |
          cp coverage-pyqt5-312/.coverage.pyqt5-3.12 .
          cp coverage-pyqt5-314/.coverage.pyqt5-3.14 .
          cp coverage-pyqt6-312/.coverage.pyqt6-3.12 .
          cp coverage-pyqt6-314/.coverage.pyqt6-3.14 .
          coverage combine \
            .coverage.pyqt5-3.12 \
            .coverage.pyqt5-3.14 \
            .coverage.pyqt6-3.12 \
            .coverage.pyqt6-3.14
          coverage xml -o coverage.xml
          coverage report

      - name: Upload merged coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-combined
          path: coverage.xml

      - name: Upload coverage to Codacy
        if: github.event_name != 'pull_request'
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          if [ -n "$CODACY_PROJECT_TOKEN" ]; then
            bash <(curl -Ls https://coverage.codacy.com/get.sh) report -r coverage.xml
          else
            echo "CODACY_PROJECT_TOKEN not set - skipping upload"
          fi
