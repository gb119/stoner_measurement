{% set version = "0.1.0" %}

package:
  name: stoner_measurement
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - stoner-measurement = stoner_measurement.main:main

requirements:
  host:
    - python >=3.13
    - pip
    - setuptools >=75
  run:
    - python >=3.13
    - asteval >=1.0
    - click>=8.3.3
    - platformdirs >=4.9
    - ipykernel >=6.0
    - jupyter_client >=8.0
    - pyyaml >=6.0
    - pandas >=2.0
    - pyqt >=5.15
    - qtpy >=2.4
    - pyqtgraph >=0.13
    - numpy >=2.0
    -  qtconsole >=5.5
    - pathspec >=1.1.1
    - scipy >=1.17.1
    - pylablib>=1.4
    - pyserial>=3.5
    - pyvisa>=1.13
    - ruff>=0.8
    - black>=26.3.1
  run_constrained:
    - pylablib >=1.4
    - pyserial >=3.5
    - pyvisa >=1.13




test:
  imports:
    - stoner_measurement
    - stoner_measurement.core.sequence
    - stoner_measurement.core.plugin_manager
    - stoner_measurement.core.runner
    - stoner_measurement.plugins.base_plugin
    - stoner_measurement.plugins.dummy
    - stoner_measurement.instruments
    - stoner_measurement.instruments.transport
    - stoner_measurement.instruments.protocol
    - stoner_measurement.instruments.keithley
    - stoner_measurement.instruments.thorlabs
  commands:
    - stoner-measurement --help || true

about:
  home: https://github.com/gb119/stoner_measurement
  license: MIT
  license_file: LICENSE
  summary: A Python/Qt (PyQt5/PyQt6 via qtpy) application for running scientific measurements
  description: |
    A Python/Qt application for running scientific measurements,
    supporting PyQt5 or PyQt6 via qtpy.
    Features a three-panel main window (instrument dock, PyQtGraph plot,
    tabbed configuration), a plugin system, and a background sequence runner.
  doc_url: https://github.com/gb119/stoner_measurement
  dev_url: https://github.com/gb119/stoner_measurement

extra:
  recipe-maintainers:
    - gb119
