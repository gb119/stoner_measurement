name: stoner_measurement
# Conda environment for developing and testing stoner_measurement.
#
# Create the environment:
#   conda env create -f environment.yml
#
# Activate and install the package in editable mode:
#   conda activate stoner_measurement
#   pip install -e .
channels:
  - phygbu
  - conda-forge
  - defaults
dependencies:
  - python>=3.13
  - pip
  - setuptools>=61
  # Runtime dependencies
  - asteval>=1.0
  - platformdirs>=4.9
  - pyyaml>=6.0
  - pandas>=2.0
  - pyqt>=6.7
  - pyqtgraph>=0.13
  - numpy>=2.0
  - click>=8.3.3
  - pytokens>=0.4.1
  - scipy>=1.17.1
  # Instrument communication
  - pylablib
  - pyserial>=3.5
  - pyvisa>=1.13
  # Testing
  - pytest>=8.0
  - pytest-qt>=4.4
  - pytest-cov>=6.0
  # Linting
  - ruff>=0.8
  - black>=26.3.1
  # Documentation
  - sphinx>=8.0
  - sphinx-better-theme>=0.1.5
  - mypy_extensions>=1.1.0
  - pathspec>=1.1.1
